name: Run MRI Pipeline

on:
  schedule:
    # Runs automatically every day at 22:00 UTC (17:00 EST)
    - cron: '0 22 * * *'
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests duckdb scikit-learn

      - name: Run the MRI Python Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python mri_pipeline.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-Update MRI Data [skip ci]"
          file_pattern: "mri_output.json"
          commit_user_name: "SentinelBot"
          commit_user_email: "bot@sentinel.app"
          commit_author: "SentinelBot <bot@sentinel.app>"

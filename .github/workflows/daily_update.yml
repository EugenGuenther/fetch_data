name: Daily Sentinel Update

# WANN soll das laufen?
on:
  schedule:
    # Täglich um 08:00 Uhr UTC (ca. 09:00/10:00 Uhr deutscher Zeit)
    - cron: '0 8 * * *'
  
  # Erlaubt dir, den Prozess manuell per Button im "Actions"-Tab zu starten
  workflow_dispatch:

# BERECHTIGUNGEN
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Repository herunterladen (Update auf v4 für Node.js 24)
      - name: Checkout Code
        uses: actions/checkout@v6

      # 2. Python Umgebung einrichten (Update auf v5 zur Umgehung von PEP 668)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip' # Optional: Beschleunigt künftige Durchläufe

      # 3. Bibliotheken installieren (Funktioniert nun fehlerfrei dank v5)
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 4. Das Python-Skript ausführen
      - name: Run Fetch Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      # 5. Ergebnis sicher speichern (Update auf offizielle Action v7)
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-Update Data [skip ci]"
          file_pattern: "sentinel_data.json"
          commit_user_name: "SentinelBot"
          commit_user_email: "bot@sentinel.app"
          commit_author: "SentinelBot <bot@sentinel.app>"
